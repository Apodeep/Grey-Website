<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey — Traversal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        canvas { display: block; }

        /* ── Cinematic Text Overlay ── */
        #text-stage {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 50;
        }
        .cin-text {
            position: absolute; font-family: 'Cairo', sans-serif; font-weight: 900;
            color: #fff; text-transform: uppercase; opacity: 0;
            will-change: transform, opacity, filter; white-space: nowrap;
        }
        /* A — huge scale-blast from center */
        .cin-text.sa {
            font-size: clamp(50px,9vw,120px); letter-spacing: .15em;
            top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); filter: blur(20px);
            text-shadow: 0 0 60px rgba(120,180,255,.8);
        }
        .cin-text.sa.active {
            animation: sa-in .7s cubic-bezier(.16,1,.3,1) forwards, sa-out .5s ease-in 1.4s forwards;
        }
        @keyframes sa-in { to { opacity:1; transform:translate(-50%,-50%) scale(1); filter:blur(0); } }
        @keyframes sa-out { to { opacity:0; transform:translate(-50%,-50%) scale(1.3); filter:blur(15px); } }

        /* B — subtitle slide-up */
        .cin-text.sb {
            font-size: clamp(14px,2vw,26px); letter-spacing: .35em;
            bottom: 20vh; left: 50%; transform: translateX(-50%) translateY(50px); filter: blur(6px);
            color: rgba(160,210,255,.9);
        }
        .cin-text.sb.active {
            animation: sb-in .6s cubic-bezier(.22,1,.36,1) .25s forwards, sb-out .4s ease-in 1.5s forwards;
        }
        @keyframes sb-in { to { opacity:.9; transform:translateX(-50%) translateY(0); filter:blur(0); } }
        @keyframes sb-out { to { opacity:0; transform:translateX(-50%) translateY(-30px); filter:blur(8px); } }

        /* C — ghost watermark */
        .cin-text.sc {
            font-size: clamp(80px,16vw,220px);
            top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.2) rotate(-12deg); filter: blur(30px);
            color: rgba(255,255,255,.03); text-shadow: 0 0 80px rgba(80,140,255,.5);
        }
        .cin-text.sc.active {
            animation: sc-in .9s cubic-bezier(.34,1.56,.64,1) forwards, sc-out .6s ease-in 1.2s forwards;
        }
        @keyframes sc-in { to { opacity:1; color:rgba(255,255,255,.06); transform:translate(-50%,-50%) scale(1) rotate(-3deg); filter:blur(0); } }
        @keyframes sc-out { to { opacity:0; transform:translate(-50%,-50%) scale(1.5) rotate(-3deg); filter:blur(25px); } }

        /* ═══ SINGULARITY COLLAPSE REVEAL ═══ */

        /* Full-screen blackout curtain */
        #blackout {
            position:fixed; top:0; left:0; width:100vw; height:100vh;
            background:#000; z-index:90; opacity:0; pointer-events:none;
            transition: opacity 0.8s ease-in;
        }
        #blackout.active { opacity:1; }

        /* Pulsing singularity orb */
        #singularity {
            position:fixed; top:50%; left:50%;
            width:6px; height:6px; border-radius:50%;
            transform: translate(-50%,-50%); z-index:91;
            background: radial-gradient(circle, #fff 0%, #88bbff 40%, transparent 70%);
            box-shadow: 0 0 20px 8px rgba(100,180,255,.6), 0 0 60px 20px rgba(80,140,255,.3);
            opacity:0; pointer-events:none;
        }
        #singularity.pulse {
            animation: orbPulse 1.6s ease-in-out forwards;
        }
        @keyframes orbPulse {
            0%   { opacity:0; transform:translate(-50%,-50%) scale(0); }
            12%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
            22%  { transform:translate(-50%,-50%) scale(.5); }
            38%  { transform:translate(-50%,-50%) scale(2.5); box-shadow: 0 0 40px 15px rgba(100,180,255,.8); }
            50%  { transform:translate(-50%,-50%) scale(.7); }
            68%  { transform:translate(-50%,-50%) scale(5); box-shadow: 0 0 80px 30px rgba(100,180,255,1); }
            82%  { transform:translate(-50%,-50%) scale(1.2); }
            100% { transform:translate(-50%,-50%) scale(200); opacity:1;
                   background: radial-gradient(circle, #fff 0%, #fff 50%, transparent 70%);
                   box-shadow: 0 0 200px 100px rgba(255,255,255,1); }
        }

        /* Logo container */
        #logo-reveal {
            position:fixed; top:0; left:0; width:100vw; height:100vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:95; pointer-events:none; opacity:0;
        }
        #logo-reveal.visible { opacity:1; }

        #logo-reveal img {
            max-width:30vw; max-height:30vh;
            opacity:0; transform: scale(1.15);
            filter: brightness(2.5);
            z-index:3;
        }
        #logo-reveal.visible img {
            animation: logoMaterialize 2s cubic-bezier(.16,1,.3,1) .3s forwards;
        }
        @keyframes logoMaterialize {
            0%   { opacity:0; transform:scale(1.15); filter:brightness(2.5); }
            40%  { opacity:1; filter:brightness(1.8); }
            100% { opacity:1; transform:scale(1); filter:brightness(1); }
        }
        #logo-reveal.idle img {
            animation: logoIdle 6s ease-in-out infinite;
        }
        @keyframes logoIdle {
            0%,100% { transform:translateY(0) scale(1); }
            50% { transform:translateY(-6px) scale(1.008); }
        }

        /* Horizontal accent line */
        .h-line {
            width:0; height:1px; z-index:4;
            background: linear-gradient(90deg, transparent, rgba(100,180,255,.6), transparent);
            margin: 24px 0;
        }
        #logo-reveal.visible .h-line {
            animation: lineWipe 1.5s cubic-bezier(.16,1,.3,1) 1.5s forwards;
        }
        @keyframes lineWipe {
            to { width: min(50vw, 400px); }
        }

        /* Tagline — letter-by-letter */
        .tagline {
            font-family:'Cairo',sans-serif; font-weight:700;
            font-size: clamp(12px,1.5vw,20px);
            letter-spacing: .3em; text-transform:uppercase;
            color: rgba(160,200,255,0);
            z-index:4; white-space:nowrap;
            display:flex; gap:0;
        }
        .tagline span {
            opacity:0; transform:translateY(10px);
            transition: opacity .4s ease-out, transform .4s ease-out, color .4s ease-out;
            color: rgba(160,200,255,.8);
        }
        .tagline span.vis { opacity:1; transform:translateY(0); }
        .tagline span.space { width:.35em; }
        .tagline span.dot-char { color:rgba(100,180,255,1); font-size:1.3em; }

        /* Background watermark text behind logo */
        .bg-text {
            position:absolute; top:50%; left:50%;
            transform: translate(-50%,-50%);
            font-family:'Cairo',sans-serif; font-weight:900;
            font-size: clamp(60px, 18vw, 260px);
            text-transform:uppercase; white-space:nowrap;
            color: rgba(255,255,255,0); letter-spacing:.08em;
            z-index:2; pointer-events:none;
            -webkit-text-stroke: 1px rgba(80,140,255,.08);
        }
        #logo-reveal.visible .bg-text {
            animation: bgTextIn 3s cubic-bezier(.16,1,.3,1) .5s forwards;
        }
        @keyframes bgTextIn {
            to { color: rgba(255,255,255,.025); -webkit-text-stroke: 1px rgba(80,140,255,.06); }
        }

        /* ═══ MOBILE RESPONSIVE ═══ */
        @media (max-width: 768px) {
            #logo-reveal img { max-width:60vw; max-height:25vh; }
            .bg-text { font-size: clamp(40px, 22vw, 120px) !important; }
            .h-line { margin: 16px 0; }
            .tagline { font-size: clamp(9px, 2.8vw, 14px) !important; letter-spacing:.2em !important; }
            .cin-text.sa { font-size: clamp(28px, 10vw, 60px) !important; }
            .cin-text.sb { font-size: clamp(10px, 2.5vw, 16px) !important; bottom:12vh !important; }
            .cin-text.sc { font-size: clamp(40px, 20vw, 100px) !important; }
        }
    </style>
</head>
<body>
    <div id="text-stage">
        <div class="cin-text sc" id="t-bg1">Grey</div>
        <div class="cin-text sa" id="t-a1">A New</div>
        <div class="cin-text sa" id="t-a2" style="margin-top:14vh">Perspective</div>
        <div class="cin-text sb" id="t-b1">More Details</div>

        <div class="cin-text sc" id="t-bg2">Discover</div>
        <div class="cin-text sa" id="t-a3">Beyond</div>
        <div class="cin-text sb" id="t-b2">The Horizon</div>
    </div>
    <div id="blackout"></div>
    <div id="singularity"></div>
    <div id="logo-reveal">
        <div class="bg-text">STORIES</div>
        <img src="./grey.png" alt="Grey">
        <div class="h-line"></div>
        <div class="tagline" id="tagline"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
    // ═══════════════════════════════════════════
    //  1. SCENE SETUP
    // ═══════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000000');
    scene.fog = new THREE.Fog('#000000', 40, 180);

    const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 4000);
    camera.position.set(0, 0, 90);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // Lights attached to camera for consistent GLB specular
    const amb = new THREE.AmbientLight(0x6666aa, 1.5);
    scene.add(amb);
    const dL1 = new THREE.DirectionalLight(0xffffff, 3); dL1.position.set(80, 150, 80);
    const dL2 = new THREE.DirectionalLight(0x4488ff, 3); dL2.position.set(-80, -150, -80);
    camera.add(dL1); camera.add(dL2);
    scene.add(camera);

    // Post-processing
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.8, 0.5, 0.35);
    composer.addPass(bloom);

    // ═══════════════════════════════════════════
    //  2. TRACK CONFIG
    // ═══════════════════════════════════════════
    const R = 7;                    // tunnel radius
    const segLen = 8;               // distance between rings
    const numSeg = 75;              // rings per tunnel
    const tLen = numSeg * segLen;   // 600
    const spaceLen = 800;
    const loopLen = tLen + spaceLen; // 1400
    const wormholeSpawns = [];

    // ═══════════════════════════════════════════
    //  3. RING TUNNEL BUILDER
    // ═══════════════════════════════════════════
    const ringCoreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    // 5 glow color tiers cycling through the tunnel
    const glowColors = [0x22ccff, 0x3399ff, 0x5566ff, 0x7744ee, 0x5566ff];
    const glowMats = glowColors.map(c => new THREE.MeshBasicMaterial({
        color: c, transparent: true, opacity: 0.35,
        blending: THREE.AdditiveBlending, depthWrite: false
    }));

    const coreGeo = new THREE.TorusGeometry(R, 0.1, 8, 80);
    const glowGeo = new THREE.TorusGeometry(R, 0.45, 8, 80);

    // Connector line material (thin lines between rings)
    const lineMat = new THREE.MeshBasicMaterial({
        color: 0x1133aa, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const lineGeo = new THREE.CylinderGeometry(0.03, 0.03, segLen, 4);
    lineGeo.rotateX(Math.PI / 2);

    function createTunnel(offsetZ) {
        const g = new THREE.Group();
        wormholeSpawns.push(new THREE.Vector3(0, 0, offsetZ + 35));

        for (let i = 0; i <= numSeg; i++) {
            const z = offsetZ - i * segLen;
            const ci = i % glowColors.length;

            const core = new THREE.Mesh(coreGeo, ringCoreMat);
            core.position.z = z;
            g.add(core);

            const glow = new THREE.Mesh(glowGeo, glowMats[ci]);
            glow.position.z = z;
            g.add(glow);

            // 4 connector rails between rings
            if (i < numSeg) {
                const angles = [0, Math.PI/2, Math.PI, Math.PI*1.5];
                angles.forEach(a => {
                    const rail = new THREE.Mesh(lineGeo, lineMat);
                    rail.position.set(Math.cos(a)*R, Math.sin(a)*R, z - segLen/2);
                    g.add(rail);
                });
            }
        }
        scene.add(g);
        return g;
    }

    createTunnel(0);
    createTunnel(-loopLen);

    // ═══════════════════════════════════════════
    //  4. STARFIELD (multi-layer)
    // ═══════════════════════════════════════════
    function makeStars(count, spread, size, color, zRange) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i += 3) {
            pos[i]   = (Math.random() - .5) * spread;
            pos[i+1] = (Math.random() - .5) * spread;
            pos[i+2] = -Math.random() * zRange;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        return new THREE.Points(geo, new THREE.PointsMaterial({
            size, color, transparent: true, opacity: .9, fog: false,
            blending: THREE.AdditiveBlending, depthWrite: false
        }));
    }
    // Far dim stars
    for (let off = -loopLen; off <= loopLen; off += loopLen) {
        const s = makeStars(3000, 3000, 1.5, 0xaabbff, loopLen);
        s.position.z = off; scene.add(s);
    }
    // Close bright stars
    for (let off = -loopLen; off <= loopLen; off += loopLen) {
        const s = makeStars(400, 2000, 3.5, 0xffffff, loopLen);
        s.position.z = off; scene.add(s);
    }
    // Warm accent stars
    for (let off = -loopLen; off <= loopLen; off += loopLen) {
        const s = makeStars(200, 2500, 2.0, 0xffaa66, loopLen);
        s.position.z = off; scene.add(s);
    }

    // ═══════════════════════════════════════════
    //  5. TUNNEL ATMOSPHERE PARTICLES
    // ═══════════════════════════════════════════
    const dustCount = 600;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 1.5 + Math.random() * (R - 2.5);
        dustPos[i*3]   = Math.cos(a) * r;
        dustPos[i*3+1] = Math.sin(a) * r;
        dustPos[i*3+2] = -Math.random() * tLen;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
        size: .6, color: 0x6688ff, transparent: true, opacity: .4,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const dust1 = new THREE.Points(dustGeo, dustMat);
    scene.add(dust1);
    const dust2 = dust1.clone();
    dust2.position.z = -loopLen;
    scene.add(dust2);

    // ═══════════════════════════════════════════
    //  6. WORMHOLE (GLB + GLOW + ACCRETION DISK)
    // ═══════════════════════════════════════════
    const gltfLoader = new THREE.GLTFLoader();
    const loadedModels = [];
    const accretionDisks = [];

    // Placeholders
    wormholeSpawns.forEach(sp => {
        const ph = new THREE.Mesh(
            new THREE.SphereGeometry(25, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })
        );
        ph.position.copy(sp); scene.add(ph);
    });

    gltfLoader.load('./blackhole_speareffect.glb', gltf => {
        // Remove placeholders
        scene.children.filter(c => c.material && c.material.wireframe && c.material.color.r === 1)
            .forEach(c => scene.remove(c));

        wormholeSpawns.forEach(sp => {
            const grp = new THREE.Group();
            const mdl = gltf.scene.clone();
            const box = new THREE.Box3().setFromObject(mdl);
            const center = box.getCenter(new THREE.Vector3());
            const sz = box.getSize(new THREE.Vector3());
            const pivot = new THREE.Group();
            mdl.position.sub(center);
            pivot.add(mdl);
            pivot.scale.setScalar(55 / Math.max(sz.x, sz.y, sz.z || 1));
            pivot.rotation.x = 0.4;
            pivot.rotation.z = 0.25;
            grp.add(pivot);
            grp.position.copy(sp);

            // Glowing additive material
            mdl.traverse(ch => {
                if (ch.isMesh) ch.material = new THREE.MeshBasicMaterial({
                    color: 0x4488ff, transparent: true, opacity: .9,
                    blending: THREE.AdditiveBlending, depthWrite: false
                });
            });

            // Inner fresnel halo
            const iGeo = new THREE.SphereGeometry(28, 32, 32);
            const iMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `varying vec3 vN; varying vec3 vV;
                    void main(){ vN=normalize(normalMatrix*normal);
                    vec4 mv=modelViewMatrix*vec4(position,1.); vV=normalize(-mv.xyz);
                    gl_Position=projectionMatrix*mv; }`,
                fragmentShader: `uniform float time; varying vec3 vN; varying vec3 vV;
                    void main(){ float f=pow(1.-abs(dot(vN,vV)),2.5);
                    float p=.8+.2*sin(time*1.5);
                    vec3 c=mix(vec3(.2,.5,1.),vec3(.9,.95,1.),f)*p*2.5;
                    gl_FragColor=vec4(c,f*.7); }`,
                transparent: true, blending: THREE.AdditiveBlending,
                depthWrite: false, side: THREE.FrontSide, fog: false
            });
            const iGlow = new THREE.Mesh(iGeo, iMat);
            iGlow.position.copy(sp); scene.add(iGlow);

            // Accretion disk particles
            const dCount = 800;
            const dGeo = new THREE.BufferGeometry();
            const dPos = new Float32Array(dCount * 3);
            const dCol = new Float32Array(dCount * 3);
            const dData = [];
            for (let i = 0; i < dCount; i++) {
                const ang = Math.random() * Math.PI * 2;
                const rad = 22 + Math.random() * 25;
                const spd = (.3 + Math.random() * .4) * (rad < 30 ? 1.5 : 1);
                dPos[i*3] = Math.cos(ang) * rad;
                dPos[i*3+1] = (Math.random()-.5) * 1.5;
                dPos[i*3+2] = Math.sin(ang) * rad;
                // orange-gold to blue gradient based on radius
                const t = (rad - 22) / 25;
                dCol[i*3]   = 1.0 - t * .6;
                dCol[i*3+1] = .4 + t * .3;
                dCol[i*3+2] = .15 + t * .85;
                dData.push({ angle: ang, radius: rad, speed: spd });
            }
            dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
            dGeo.setAttribute('color', new THREE.BufferAttribute(dCol, 3));
            const dMat = new THREE.PointsMaterial({
                size: 1.8, vertexColors: true, transparent: true, opacity: .7,
                blending: THREE.AdditiveBlending, depthWrite: false, fog: false
            });
            const disk = new THREE.Points(dGeo, dMat);
            disk.position.copy(sp);
            disk.rotation.x = Math.PI * .42;
            scene.add(disk);
            accretionDisks.push({ mesh: disk, data: dData });

            grp.userData = { innerGlow: iGlow, pivot };
            scene.add(grp);
            loadedModels.push(grp);
        });
    }, undefined, err => {
        console.error('GLB error:', err);
    });

    // ═══════════════════════════════════════════
    //  7. ANIMATION STATE
    // ═══════════════════════════════════════════
    let vel = 0.08, targetVel = 0.08;
    let loopCount = 0, logoRevealed = false, finalSeq = false, finalT = 0;
    let text1Fired = false, text2Fired = false;

    function fireText(ids, gap) {
        ids.forEach((id, i) => {
            setTimeout(() => {
                const el = document.getElementById(id);
                if (!el) return;
                el.classList.remove('active');
                void el.offsetWidth;
                el.classList.add('active');
            }, i * gap);
        });
    }

    // ═══════════════════════════════════════════
    //  8. RENDER LOOP
    // ═══════════════════════════════════════════
    function animate() {
        requestAnimationFrame(animate);
        const t = performance.now() * .001;

        // ── Move camera ──
        camera.position.z -= vel;

        // ── Text triggers ──
        if (!text1Fired && loopCount === 0 && camera.position.z < -tLen - 20) {
            text1Fired = true;
            fireText(['t-bg1','t-a1','t-a2','t-b1'], 200);
        }
        if (!text2Fired && loopCount === 1 && camera.position.z < -tLen - 20) {
            text2Fired = true;
            fireText(['t-bg2','t-a3','t-b2'], 200);
        }

        // ── Wormhole animation ──
        loadedModels.forEach(g => {
            if (g.userData.pivot) g.userData.pivot.rotation.y -= .007;
            if (g.userData.innerGlow) g.userData.innerGlow.material.uniforms.time.value = t;
        });

        // ── Accretion disk orbit ──
        accretionDisks.forEach(({ mesh, data }) => {
            const p = mesh.geometry.attributes.position.array;
            data.forEach((d, i) => {
                d.angle += d.speed * .015;
                p[i*3]   = Math.cos(d.angle) * d.radius;
                p[i*3+2] = Math.sin(d.angle) * d.radius;
            });
            mesh.geometry.attributes.position.needsUpdate = true;
        });

        // ── Speed zones ──
        if (!finalSeq) {
            const z = camera.position.z;
            if (z > 60)                        targetVel = 0.4;
            else if (z > 35)                   targetVel = 6;
            else if (z > -tLen)                targetVel = 2.8;
            else if (z > -(tLen + spaceLen - 60)) targetVel = 5;
            else                               targetVel = 7;
        }
        vel += (targetVel - vel) * .025;

        // ── Camera feel ──
        const inTunnel = camera.position.z > -tLen && camera.position.z < 0;
        if (inTunnel) {
            // subtle speed-shake
            if (vel > 1.5) {
                camera.position.x += (Math.random()-.5) * vel * .012;
                camera.position.y += (Math.random()-.5) * vel * .012;
            }
            camera.position.y += (0 - camera.position.y) * .04;
        } else {
            camera.position.x += (0 - camera.position.x) * .03;
            camera.position.y += (0 - camera.position.y) * .03;
        }

        // ── Loop or finale ──
        if (camera.position.z <= -loopLen && !finalSeq) {
            loopCount++;
            camera.position.z += loopLen;
        }
        if (loopCount >= 2 && camera.position.z < -(tLen + 200) && !logoRevealed) {
            finalSeq = true; targetVel = 0; logoRevealed = true; finalT = 0;
            // hide wormholes
            loadedModels.forEach(g => {
                g.visible = false;
                if (g.userData.innerGlow) g.userData.innerGlow.visible = false;
            });
            accretionDisks.forEach(d => d.mesh.visible = false);

            // ═══ SINGULARITY COLLAPSE SEQUENCE ═══
            
            // Phase 1: Blackout — instant darkness
            document.getElementById('blackout').classList.add('active');
            bloom.strength = 0.5;

            // Phase 2: Singularity orb pulses (0.6s after blackout)
            setTimeout(() => {
                document.getElementById('singularity').classList.add('pulse');
            }, 600);

            // Phase 3: Orb peaks → white flash (2.1s)
            setTimeout(() => {
                document.getElementById('singularity').style.display = 'none';
                document.getElementById('blackout').style.background = '#fff';
                bloom.strength = 8;
            }, 2100);

            // Phase 4: White fades → logo materializes (2.5s)
            setTimeout(() => {
                document.getElementById('blackout').style.transition = 'opacity 1.8s ease-out';
                document.getElementById('blackout').style.opacity = '0';
                bloom.strength = 1.5;
                document.getElementById('logo-reveal').classList.add('visible');
            }, 2500);

            // Phase 5: Idle float (5s)
            setTimeout(() => {
                document.getElementById('logo-reveal').classList.add('idle');
            }, 5000);

            // Phase 6: Tagline typewriter (4s)
            setTimeout(() => {
                const text = "We Don't Create. We Tell Stories";
                const container = document.getElementById('tagline');
                text.split('').forEach(ch => {
                    const span = document.createElement('span');
                    if (ch === ' ') { span.className = 'space'; span.innerHTML = '&nbsp;'; }
                    else if (ch === '.') { span.className = 'dot-char'; span.textContent = ch; }
                    else { span.textContent = ch; }
                    container.appendChild(span);
                });
                const letters = container.querySelectorAll('span');
                letters.forEach((s, i) => {
                    setTimeout(() => s.classList.add('vis'), i * 55);
                });
            }, 4000);
        }
        if (finalSeq) {
            vel = Math.max(vel, 0);
            finalT++;
        }

        composer.render();
    }

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
    });

    animate();
    </script>
</body>
</html>
