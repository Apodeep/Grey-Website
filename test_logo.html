<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; padding: 50px; font-family: sans-serif; }
  .row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 50px; border: 1px solid #333; padding: 20px;}
  .col { display: flex; flex-direction: column; justify-content: space-between; }
  img { border: 1px solid red; }
</style>
</head>
<body>
  <h2>1. Actual Logo (Target)</h2>
  <img src="assets/logo/actual logo.png" style="height: 150px;">

  <h2>2. Flex Layout Attempt</h2>
  <div class="row" style="height: 150px;">
    <img src="assets/logo/g.png" style="height: 100%;">
    <img src="assets/logo/r.png" style="height: 100%;">
    <div class="col" style="height: 100%;">
      <img src="assets/logo/e.up.png" style="height: 30%;">
      <img src="assets/logo/e.middle.png" style="height: 30%;">
      <img src="assets/logo/e.bottom.png" style="height: 30%;">
    </div>
    <img src="assets/logo/y.png" style="height: 100%;">
  </div>

  <h2>3. Raw Images (Natural sizes scaled to 200px height max)</h2>
  <div style="display:flex; flex-wrap:wrap; gap: 10px;">
    <div>g.png<br><img src="assets/logo/g.png" style="max-height: 200px"></div>
    <div>r.png<br><img src="assets/logo/r.png" style="max-height: 200px"></div>
    <div>e.up.png<br><img src="assets/logo/e.up.png" style="max-height: 200px"></div>
    <div>e.middle.png<br><img src="assets/logo/e.middle.png" style="max-height: 200px"></div>
    <div>e.bottom.png<br><img src="assets/logo/e.bottom.png" style="max-height: 200px"></div>
    <div>y.png<br><img src="assets/logo/y.png" style="max-height: 200px"></div>
  </div>
</body>
</html>
